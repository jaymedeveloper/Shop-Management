<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg,#eef2ff,#f8fafc);
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }

        .profile-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg,#6366f1,#4f46e5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin: auto;
        }

        .name {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 600;
        }

        .btn {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
        }

        .btn-back {
            background: #6366f1;
            color: white;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- Profile -->
    <div class="profile-circle">
        {{ name[0].upper() if name else 'U' }}
    </div>

    <div class="name">
        {{ name }}
    </div>

    <!-- Back -->
    <a href="/index">
        <button class="btn btn-back">⬅ Back to Dashboard</button>
    </a>

    <!-- 🔥 Logout Button (opens modal) -->
    <button class="btn btn-logout" data-bs-toggle="modal" data-bs-target="#logoutModal">
        🚪 Logout
    </button>

</div>

<!-- 🔥 MODAL -->
<div class="modal fade" id="logoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirm Logout</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                Are you sure you want to logout?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

                <a href="/logout">
                    <button class="btn btn-danger">Yes, Logout</button>
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
