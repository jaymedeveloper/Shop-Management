<!DOCTYPE html>
<html>

<head>
    <title>Billing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .table thead {
            background: #f1f3f6;
        }

        h2 {
            font-weight: 600;
        }

        .total-box {
            font-size: 20px;
            font-weight: bold;
        }

        @media print {

            body * {
                visibility: hidden;
            }

            #billSection,
            #billSection * {
                visibility: visible;
            }

            #billSection {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
            }

            /* ❌ hide unwanted */
            .btn,
            #printModal,
            #overlay {
                display: none !important;
            }
        }

        .selected-btn {
            outline: 3px solid #0d6efd;
            transform: scale(1.08);
            transition: 0.2s;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <div class="card p-4 bg-white">

            <div id="billSection">
                <!-- pura bill table + total yaha hona chahiye -->


                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>🧾 Billing | Bill No: <span id="billNo">{{ bill_no }}</span></h2>
                    <button class="btn btn-secondary" onclick="window.location.href='/order'">
                        ⬅ Back
                    </button>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-bordered text-center align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="billTable"></tbody>
                    </table>
                </div>

                <!-- Grand Total -->
                <div class="text-end mt-3 total-box">
                    Grand Total: ₹ <span id="grandTotal">0</span>
                </div>
            </div>
            <!-- Buttons -->
            <div class="mt-4 d-flex justify-content-between">
                <button class="btn btn-danger" onclick="clearBill()">
                    <i class="bi bi-trash me-1"></i> Clear
                </button>



                <button class="btn btn-success" id="saveBtn" onclick="saveBill()">
                    <span id="saveText">
                        <i class="bi bi-floppy me-1"></i> Save
                    </span>
                </button>
            </div>

        </div>

    </div>

    <!-- Print Modal -->
    <div class="modal fade" id="printModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Print Bill</h5>
                </div>

                <div class="modal-body text-center">
                    <p class="mb-0">Do you want to print this bill?</p>
                </div>

                <div class="modal-footer justify-content-center">
                    <button class="btn btn-success" id="btnPrint" onclick="handlePrint(true)">
                        <i class="bi bi-printer"></i> Yes, Print
                    </button>

                    <button class="btn btn-secondary" id="btnSkip" onclick="handlePrint(false)">
                        Skip
                    </button>
                </div>

            </div>
        </div>
    </div>
    <div id="overlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:1040;">
    </div>
    <script>

        let isSaving = false;
        let items = JSON.parse(localStorage.getItem("billData")) || [];

        function renderBill() {
            let tbody = document.getElementById("billTable");
            let total = 0;
            tbody.innerHTML = "";

            items.forEach((item, index) => {
                let rowTotal = item.price * item.count;
                total += rowTotal;

                let row = `
        <tr>
            <td>${index + 1}</td>
            <td>${item.code}</td>
            <td>${item.name}</td>
            <td>₹${item.price}</td>
            <td>${item.count}</td>
            <td>₹${rowTotal}</td>
        </tr>
        `;
                tbody.innerHTML += row;
            });

            document.getElementById("grandTotal").innerText = total;
        }

        function clearBill() {
            localStorage.removeItem("billData");
            location.reload();
        }

        function printBill() {
            window.print();
        }



        renderBill();



        function saveBill() {
            if (items.length === 0) {
                alert("No items");
                return;
            }

            if (isSaving) return;


            isSaving = true;

            let btn = document.getElementById("saveBtn");
            let text = document.getElementById("saveText");
            let billNo = document.getElementById("billNo").innerText;

            // 🔥 loader
            text.innerHTML = `
        <span class="spinner-border spinner-border-sm me-2"></span>
        Saving...`;
            btn.disabled = true;

            document.getElementById("overlay").style.display = "block";

            fetch("/save-bill", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    items: items,
                    bill_no: billNo
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {

                        text.innerHTML = "Saved ✅";

                        // 🔥 show modal instead of confirm
                        let modal = new bootstrap.Modal(document.getElementById('printModal'));
                        modal.show();

                        setTimeout(initModalSelection, 200);

                    } else {
                        text.innerHTML = "Failed ❌";
                        enableUI();
                    }
                })
                .catch(err => {
                    console.error(err);
                    text.innerHTML = "Error ❌";
                    enableUI();
                });
        }

        document.addEventListener("keydown", function (e) {
            if (isSaving) {
                e.preventDefault(); // 🔥 sab block
                return;
            }

            if (e.ctrlKey && (e.key === "s" || e.key === "S")) {
                e.preventDefault();
                saveBill();
            }
        });



        function handlePrint(shouldPrint) {

            if (shouldPrint) {
                window.print();
            }

            // 🔥 clear data
            localStorage.removeItem("billData");

            // 🔥 redirect
            window.location.href = "/order";
        }

        let selectedIndex = 0;
        let modalButtons = [];

        function initModalSelection() {
            modalButtons = [
                document.getElementById("btnPrint"),
                document.getElementById("btnSkip")
            ];

            selectedIndex = 0;
            updateSelection();
        }

        function updateSelection() {
            modalButtons.forEach((btn, index) => {
                btn.classList.remove("selected-btn");
                if (index === selectedIndex) {
                    btn.classList.add("selected-btn");
                }
            });
        }

        document.addEventListener("keydown", function (e) {

            let modalOpen = document.getElementById('printModal').classList.contains('show');
            if (!modalOpen) return;

            if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
                e.preventDefault();

                selectedIndex = selectedIndex === 0 ? 1 : 0;
                updateSelection();
            }

            if (e.key === "Enter") {
                e.preventDefault();
                modalButtons[selectedIndex].click();
            }
        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
