<!DOCTYPE html>
<html>

<head>
    <title>Inventory System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f7fb;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-box {
            border-radius: 15px;
            padding: 20px;
            background: white;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 28px;
        }

        .btn {
            border-radius: 10px;
        }

        /* 🔥 Profile Style */
        .profile-box {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg,#6366f1,#4f46e5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .profile-name {
            font-weight: 500;
        }

        @media (max-width: 576px) {
            h3 {
                font-size: 20px;
            }

            .card-box {
                padding: 15px;
            }

            .profile-name {
                display: none; /* mobile pe sirf circle dikhe */
            }
        }
    </style>
</head>

<body>

    <!-- 🔥 PROFILE (TOP RIGHT) -->
    <div class="profile-box">
        <a href="/profile" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
            
            <div class="profile-circle">
                {{ session['name'][0].upper() if session.get('name') else 'U' }}
            </div>

            <div class="profile-name">
                {{ session.get('name') }}
            </div>

        </a>
    </div>

    <div class="container main-container">

        <!-- Title -->
        <div class="text-center mb-4">
            <h3>📦 Inventory Management</h3>
            <small class="text-muted">Retail POS System</small>
        </div>

        <!-- Cards -->
        <div class="row g-3">

            <!-- Order -->
            <div class="col-12 col-md-4">
                <div class="card-box text-center">
                    <div class="icon text-primary mb-2">
                        <i class="bi bi-cart"></i>
                    </div>
                    <h6>New Order</h6>
                    <p class="text-muted small">Scan & Generate Bill</p>
                    <a href="/order" class="btn btn-primary w-100">Open</a>
                </div>
            </div>

            <!-- Products -->
            <div class="col-12 col-md-4">
                <div class="card-box text-center">
                    <div class="icon text-success mb-2">
                        <i class="bi bi-box"></i>
                    </div>
                    <h6>Products</h6>
                    <p class="text-muted small">Manage Inventory</p>
                    <a href="/products" class="btn btn-success w-100">Open</a>
                </div>
            </div>

            <!-- Bills -->
            <div class="col-12 col-md-4">
                <div class="card-box text-center">
                    <div class="icon text-warning mb-2">
                        <i class="bi bi-receipt"></i>
                    </div>
                    <h6>Bills</h6>
                    <p class="text-muted small">View Records</p>
                    <a href="/bills" class="btn btn-warning w-100">Open</a>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="text-center mt-4">
            <small class="text-muted">⚡ Fast • Simple • Barcode Powered</small>
        </div>

    </div>

</body>

</html>
