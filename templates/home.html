<!DOCTYPE html>
<html>

<head>
    <title>Inventory Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI';

            background: linear-gradient(270deg, #f8fafc, #eef2ff, #f8fafc);
            background-size: 600% 600%;
            animation: bgMove 12s ease infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-box {
            width: 380px;
            padding: 40px;
            text-align: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg,#6366f1,#4f46e5);
            color: white;
            font-weight: 600;
        }

        .btn-outline {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #6366f1;
            background: transparent;
            color: #4f46e5;
        }
    </style>
</head>

<body>

<div class="card-box">
    <h4>Inventory Manager</h4>
    <p class="text-muted">Manage products & billing easily</p>

    <a href="/login"><button class="btn-main">Login</button></a>
    <a href="/signup"><button class="btn-outline">Create Account</button></a>
</div>

</body>
</html>
