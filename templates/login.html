<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI';

            background: linear-gradient(270deg, #f8fafc, #eef2ff, #f8fafc);
            background-size: 600% 600%;
            animation: bgMove 12s ease infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-box {
            width: 360px;
            padding: 35px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            transition: 0.25s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-weight: 600;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #4f46e5;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h4 class="title">Login</h4>

    {% if msg %}
    <div class="alert alert-danger text-center py-2">
        {{ msg }}
    </div>
    {% endif %}

    <form method="post" autocomplete="off">
        
        <input name="mobile"
               class="input-field"
               placeholder="Mobile Number"
               pattern="[0-9]{10}"
               title="Enter 10 digit mobile number"
               required>

        <div style="position: relative;">
            <input id="pass"
                   name="password"
                   type="password"
                   class="input-field"
                   placeholder="Password"
                   required>

            <span onclick="togglePass()"
                  style="position:absolute; right:10px; top:12px; cursor:pointer;">👁️</span>
        </div>

        <button class="btn-main" onclick="this.innerText='Logging in...'">
            Login
        </button>

    </form>

    <!-- 🔥 Conditional Signup Link -->
    <div class="link">
        
            <a href="/signup">New user? Create account</a>
        
    </div>

</div>

<script>
function togglePass(){
    let p = document.getElementById("pass");
    p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
