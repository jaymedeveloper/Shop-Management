<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI';

            /* SAME SMOOTH BACKGROUND */
            background: linear-gradient(270deg, #f8fafc, #eef2ff, #f8fafc);
            background-size: 600% 600%;
            animation: bgMove 12s ease infinite;
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* CARD */
        .card-box {
            width: 360px;
            padding: 35px;

            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);

            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);

            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TITLE */
        .title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* INPUT */
        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;

            border-radius: 12px;
            border: 1px solid #d1d5db;

            transition: 0.25s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            transform: scale(1.02);
        }

        /* BUTTON */
        .btn-main {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;

            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-weight: 600;

            transition: 0.25s;
        }

        .btn-main:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        /* LINK */
        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #4f46e5;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card-box">

        <h4 class="title">Create Account</h4>
        {% if msg %}
        <div class="alert alert-danger">{{ msg }}</div>
        {% endif %}
        <form method="post">

            <input name="name" class="input-field" placeholder="Full Name">
            <input name="mobile" class="input-field" placeholder="Mobile Number">
            <input name="password" type="password" class="input-field" placeholder="Password">

            <button class="btn-main">Create Account</button>

        </form>

        <div class="link">
            <a href="/login">Already have account? Login</a>
        </div>

    </div>

</body>

</html>
