<!DOCTYPE html>
<html>

<head>
    <title>Bills</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-end mb-3">
            <a href="/index" class="btn btn-light border shadow-sm btn-sm">
                <i class="bi bi-house-door-fill me-1"></i> Home
            </a>
        </div>
        <div class="card p-4">

            <h3 class="mb-4">🧾 All Bills</h3>

            <table class="table table-bordered text-center">
                <thead>
                    <tr>
                        <th>Bill No</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for b in bills %}
                    <tr>
                        <td>{{ b.bill_no }}</td>
                        <td>{{ b.date }}</td>
                        <td>₹ {{ b.total }}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick='viewBill({{ b | tojson }})'>
                                View
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

    <!-- 🔥 Modal -->
    <div class="modal fade" id="billModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Bill Details</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <h5>Bill No: <span id="mBillNo"></span></h5>
                    <p>Date: <span id="mDate"></span></p>

                    <table class="table table-bordered text-center">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="billItems"></tbody>
                    </table>

                    <h5 class="text-end">Total: ₹ <span id="mTotal"></span></h5>

                </div>

            </div>
        </div>
    </div>

    <script>
        function viewBill(bill) {

            document.getElementById("mBillNo").innerText = bill.bill_no;
            document.getElementById("mDate").innerText = bill.date;
            document.getElementById("mTotal").innerText = bill.total;

            let tbody = document.getElementById("billItems");
            tbody.innerHTML = "";

            bill.items.forEach(item => {
                tbody.innerHTML += `
        <tr>
            <td>${item.code}</td>
            <td>${item.Name}</td>
            <td>${item.Price}</td>
            <td>${item.Qty}</td>
            <td>${item.Total}</td>
        </tr>
        `;
            });

            let modal = new bootstrap.Modal(document.getElementById("billModal"));
            modal.show();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
